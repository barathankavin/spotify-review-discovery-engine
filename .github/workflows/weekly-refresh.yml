# Optional: weekly data refresh (manual dispatch or cron)
# Requires repository secrets: GROQ_API_KEY (optional if using --rule-baseline)

name: Weekly review refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run refresh pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EMBEDDING_BACKEND: local
        run: |
          python -m src.ops.run refresh --skip-ingestion --rule-baseline

      - name: Smoke test
        run: python scripts/smoke_test.py

      - name: Commit processed artifacts if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/processed/*.json data/processed/lkg/
          git diff --staged --quiet || git commit -m "chore: weekly processed artifact refresh"
          git push
