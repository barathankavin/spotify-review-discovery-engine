# Weekly data refresh: fetch ONLY reviews newer than the last collected date,
# merge them into the existing corpus (additive — never shrinks the dataset),
# re-embed just the new reviews, re-analyze, and commit so the deployed dashboard
# shows new numbers. Incremental fetch keeps each run fast (it stops paging as soon
# as it reaches reviews we already have).
#
# Groq tokens: by default the refresh uses ZERO Groq tokens — ingestion is scraping,
# embeddings are local (MiniLM), and theme analysis uses the keyword baseline. Groq
# tokens are reserved for the live RAG chat. Set the "use_groq" input to true on a
# manual run only if you want richer LLM themes (this spends tokens).
# The built-in GITHUB_TOKEN is used to commit artifacts (needs contents: write below).

name: Weekly review refresh

on:
  workflow_dispatch:
    inputs:
      lookback_weeks:
        description: "Full-build window if there's no existing corpus yet (incremental runs ignore this)"
        required: false
        default: "10"
      use_groq:
        description: "Use Groq for richer theme analysis (SPENDS TOKENS). Default false = keyword baseline, no tokens."
        required: false
        default: "false"
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC

permissions:
  contents: write

concurrency:
  group: weekly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh pipeline (ingest -> embed -> analyze)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EMBEDDING_BACKEND: local
          LOOKBACK_WEEKS: ${{ github.event.inputs.lookback_weeks || '10' }}
          USE_GROQ: ${{ github.event.inputs.use_groq || 'false' }}
          # Only used when USE_GROQ=true: pace calls under free-tier per-minute limits.
          GROQ_THROTTLE: "true"
          GROQ_RPM_LIMIT: "28"
          GROQ_TPM_LIMIT: "11000"
          GROQ_CALL_SLEEP_S: "0.5"
        run: |
          set -e
          WEEKS="${LOOKBACK_WEEKS:-10}"
          # --incremental: fetch only reviews newer than the last collected date
          # and merge into the existing corpus. The lookback window is only used
          # for the first/full build when no corpus exists yet.
          if [ "${USE_GROQ}" = "true" ]; then
            echo "Incremental refresh WITH Groq theme analysis (spends tokens)..."
            python -m src.ops.run refresh --incremental --lookback-weeks "${WEEKS}"
          else
            echo "Incremental refresh with keyword baseline — NO Groq tokens..."
            python -m src.ops.run refresh --incremental --lookback-weeks "${WEEKS}" --rule-baseline
          fi

      - name: Smoke test (no Groq tokens)
        continue-on-error: true
        env:
          EMBEDDING_BACKEND: local
          RAG_USE_GROQ: "false"  # validate retrieval without spending chat tokens
        run: python scripts/smoke_test.py

      - name: Commit refreshed artifacts if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/*.json data/processed/lkg/
          if git diff --staged --quiet; then
            echo "No artifact changes to commit."
          else
            git commit -m "chore: weekly review refresh (ingest + embed + analysis)"
            git push
          fi
